spring:
  datasource:
    url: jdbc:postgresql://${CHAVE_POSTGRES_HOST}:${CHAVE_POSTGRES_PORT}/${CHAVE_POSTGRES_DB}
    username: ${CHAVE_POSTGRES_USER}
    password: ${CHAVE_POSTGRES_PASSWORD}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${PORT:5000}
