name: CI - Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: navalis_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d navalis_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Compilar projeto
        run: ./mvnw compile -B

      - name: Rodar testes
        env:
          CHAVE_POSTGRES_DB: navalis_test
          CHAVE_POSTGRES_USER: test_user
          CHAVE_POSTGRES_PASSWORD: test_password
          CHAVE_POSTGRES_PORT: 5432
          JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-chars
        run: ./mvnw verify -B

      - name: Build do pacote (JAR)
        run: ./mvnw package -DskipTests -B

      - name: Upload do JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: navalis-backend
          path: target/*.jar
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t navalis-backend:${{ github.sha }} .

      - name: Verificar imagem
        run: docker images navalis-backend
